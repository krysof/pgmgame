				dpad: controls.querySelector(".ejs_dpad_main"),
				c: controls.querySelector(".ejs_virtualGamepad_button.b_c"),
				d: controls.querySelector(".ejs_virtualGamepad_button.b_d"),
				a: controls.querySelector(".ejs_virtualGamepad_button.b_a"),
				b: controls.querySelector(".ejs_virtualGamepad_button.b_b"),
				coin: controls.querySelector(".ejs_virtualGamepad_button.b_coin"),
				start: controls.querySelector(".ejs_virtualGamepad_button.b_start")
			};
			const layoutStoragePrefix = "pgmgame-controls-layout-v3";
			const getLayoutOrientation = () => isPortraitMode() ? "portrait" : "landscape";
			const getLayoutStorageKey = (orientation) => `${layoutStoragePrefix}-${orientation}`;
			const defaultControlLayout = {
				dpad: { x: 0, y: 0, scale: 1 },
				c: { x: 0, y: 0, scale: 1 },
				d: { x: 0, y: 0, scale: 1 },
				a: { x: 0, y: 0, scale: 1 },
				b: { x: 0, y: 0, scale: 1 },
				coin: { x: 0, y: 0, scale: 1 },
				start: { x: 0, y: 0, scale: 1 }
			};
			const cloneDefaultControlLayout = () => JSON.parse(JSON.stringify(defaultControlLayout));
			const getCurrentLayoutBasis = () => {
				const rect = controls.getBoundingClientRect();
				return {
					width: Math.max(1, Math.round(rect.width || window.innerWidth || 1)),
					height: Math.max(1, Math.round(rect.height || window.innerHeight || 1))
				};
			};
			const readControlLayoutRecord = (orientation) => {
				try {
					const saved = JSON.parse(localStorage.getItem(getLayoutStorageKey(orientation)) || "{}");
					const savedLayout = saved.layout || saved;
					return {
						basis: saved.basis || null,
						layout: { ...cloneDefaultControlLayout(), ...savedLayout }
					};
				} catch (e) {
					return { basis: null, layout: cloneDefaultControlLayout() };
				}
			};
			let activeLayoutOrientation = getLayoutOrientation();
			let activeLayoutRecord = readControlLayoutRecord(activeLayoutOrientation);
			let controlLayout = activeLayoutRecord.layout;
			let layoutEditing = false;
			let layoutDrag = null;
			const normalizeLayoutItem = (item) => ({
				x: Math.max(-1000, Math.min(1000, Number(item && item.x) || 0)),
				y: Math.max(-1000, Math.min(1000, Number(item && item.y) || 0)),
				scale: Math.max(.55, Math.min(1.85, Number(item && item.scale) || 1))
			});
			const saveControlLayout = () => {
				localStorage.setItem(getLayoutStorageKey(activeLayoutOrientation), JSON.stringify({
					version: 1,
					orientation: activeLayoutOrientation,
					basis: getCurrentLayoutBasis(),
					layout: controlLayout
				}));
			};
			const applyControlLayout = () => {
				Object.entries(controlTargets).forEach(([key, element]) => {
					if (!element) return;
					const item = normalizeLayoutItem(controlLayout[key]);
					controlLayout[key] = item;
					element.classList.add("pgmgame-layout-target");
					element.style.setProperty("--pgm-layout-x", `${item.x}px`);
					element.style.setProperty("--pgm-layout-y", `${item.y}px`);
					element.style.setProperty("--pgm-layout-scale", item.scale);
				});
			};
			const setLayoutEditing = (enabled) => {
				layoutEditing = enabled;
				document.body.classList.toggle("pgmgame-layout-editing", enabled);
				toolbar.classList.toggle("pgmgame-layout-editing-toolbar", enabled);
				if (resetLayoutButton) resetLayoutButton.hidden = !enabled;
				if (copyLayoutButton) copyLayoutButton.hidden = !enabled;
				if (pasteLayoutButton) pasteLayoutButton.hidden = !enabled;
				layoutButton.textContent = enabled ? "完成" : "布局";
			};
			const resetControlLayout = () => {
				controlLayout = cloneDefaultControlLayout();
				localStorage.removeItem(getLayoutStorageKey(activeLayoutOrientation));
				applyControlLayout();
				setLayoutEditing(false);
			};
			const syncControlLayoutOrientation = () => {
				const nextOrientation = getLayoutOrientation();
				if (nextOrientation === activeLayoutOrientation) return;
				if (layoutDrag) {
					saveControlLayout();
					layoutDrag = null;
				}
				saveControlLayout();
				activeLayoutOrientation = nextOrientation;
				activeLayoutRecord = readControlLayoutRecord(activeLayoutOrientation);
				controlLayout = activeLayoutRecord.layout;
				applyControlLayout();
			};
			const getRelativeLayoutExport = (orientation) => {
				const record = orientation === activeLayoutOrientation
					? { basis: getCurrentLayoutBasis(), layout: controlLayout }
					: readControlLayoutRecord(orientation);
				const basis = record.basis || getCurrentLayoutBasis();
				return Object.fromEntries(Object.entries(defaultControlLayout).map(([key]) => {
					const item = normalizeLayoutItem(record.layout[key]);
					return [key, {
						rx: Number((item.x / basis.width).toFixed(4)),
						ry: Number((item.y / basis.height).toFixed(4)),
						scale: Number(item.scale.toFixed(3))
					}];
				}));
			};
			const parseControlLayoutCode = (text) => {
				const source = String(text || "").trim();
				const firstBrace = source.indexOf("{");
				const lastBrace = source.lastIndexOf("}");
				if (firstBrace < 0 || lastBrace <= firstBrace) throw new Error("没有找到布局对象。");
				const parsed = JSON.parse(source.slice(firstBrace, lastBrace + 1));
				if (!parsed || (!parsed.landscape && !parsed.portrait)) throw new Error("布局代码格式不正确。");
				return parsed;
			};
			const relativeLayoutToPixels = (relativeLayout, basis) => {
				const nextLayout = cloneDefaultControlLayout();
				Object.keys(defaultControlLayout).forEach((key) => {
					const item = relativeLayout && relativeLayout[key];
					if (!item) return;
					nextLayout[key] = normalizeLayoutItem({
						x: Number(item.rx) * basis.width,
						y: Number(item.ry) * basis.height,
						scale: item.scale
					});
				});
				return nextLayout;
			};
			const saveImportedControlLayout = (orientation, relativeLayout) => {
				if (!relativeLayout) return;
				const basis = getCurrentLayoutBasis();
				const importedLayout = relativeLayoutToPixels(relativeLayout, basis);
				localStorage.setItem(getLayoutStorageKey(orientation), JSON.stringify({
					version: 1,
					orientation,
					basis,
					layout: importedLayout
				}));
				if (orientation === activeLayoutOrientation) {
					controlLayout = importedLayout;
					applyControlLayout();
				}
			};
			const pasteControlLayoutCode = async () => {
				let text = "";
				try {
					if (navigator.clipboard && navigator.clipboard.readText) text = await navigator.clipboard.readText();
				} catch (e) {}
				if (!text) text = window.prompt("粘贴布局代码：", "") || "";
				if (!text.trim()) return;
				try {
					const imported = parseControlLayoutCode(text);
					saveImportedControlLayout("landscape", imported.landscape);
					saveImportedControlLayout("portrait", imported.portrait);
					activeLayoutRecord = readControlLayoutRecord(activeLayoutOrientation);
					controlLayout = activeLayoutRecord.layout;
					applyControlLayout();
					alert("布局已粘贴并保存。");
				} catch (e) {
					alert(`布局代码无效：${e.message || e}`);
				}
			};
			const copyControlLayoutCode = async () => {
				saveControlLayout();
				const exportCode = `const pgmgameDefaultControlLayouts = ${JSON.stringify({
					unit: "relative-to-virtual-gamepad",
					landscape: getRelativeLayoutExport("landscape"),
					portrait: getRelativeLayoutExport("portrait")
				}, null, "\t")};`;
				try {
					await navigator.clipboard.writeText(exportCode);
					alert("横版/竖版相对布局代码已复制。");
				} catch (e) {
					window.prompt("复制布局代码：", exportCode);
				}
			};
			const endLayoutDrag = () => {
				if (!layoutDrag) return;
				saveControlLayout();
				layoutDrag = null;
			};
			const moveLayoutDrag = (event) => {
				if (!layoutDrag) return;
				event.preventDefault();
				const item = normalizeLayoutItem(layoutDrag.startItem);
				if (layoutDrag.mode === "move") {
					item.x += event.clientX - layoutDrag.startX;
					item.y += event.clientY - layoutDrag.startY;
				} else {
					const delta = Math.max(event.clientX - layoutDrag.startX, event.clientY - layoutDrag.startY);
					item.scale += delta / 160;
				}
				controlLayout[layoutDrag.key] = normalizeLayoutItem(item);
				applyControlLayout();
			};
			const startLayoutDrag = (event, key, mode) => {
				if (!layoutEditing) return;
				event.preventDefault();
				event.stopPropagation();
				if (event.stopImmediatePropagation) event.stopImmediatePropagation();
				const pointerEvent = event;
				layoutDrag = {
					key,
					mode,
					startX: pointerEvent.clientX,
					startY: pointerEvent.clientY,
					startItem: { ...normalizeLayoutItem(controlLayout[key]) }
				};
			};
			const blockLayoutInput = (event) => {
				if (!layoutEditing || !event.target.closest(".pgmgame-layout-target")) return;
				event.preventDefault();
				event.stopPropagation();
				if (event.stopImmediatePropagation) event.stopImmediatePropagation();
			};
			Object.entries(controlTargets).forEach(([key, element]) => {
				if (!element) return;
				const handle = document.createElement("div");
				handle.className = "pgmgame-layout-handle";
				handle.setAttribute("aria-hidden", "true");
				element.appendChild(handle);
				element.addEventListener("pointerdown", (event) => startLayoutDrag(event, key, "move"));
				handle.addEventListener("pointerdown", (event) => startLayoutDrag(event, key, "scale"));
			});
			document.addEventListener("pointermove", moveLayoutDrag);
			document.addEventListener("pointerup", endLayoutDrag);
			document.addEventListener("pointercancel", endLayoutDrag);
			["touchstart", "touchmove", "touchend", "touchcancel", "click"].forEach((eventName) => {
				controls.addEventListener(eventName, blockLayoutInput, true);
			});
			applyControlLayout();

			const menuToggle = document.createElement("button");
			menuToggle.id = "pgmgame-toolbar-menu";
			menuToggle.type = "button";
			menuToggle.textContent = "菜单";
			toolbar.appendChild(menuToggle);

			const toggle = document.createElement("button");
			toggle.id = "pgmgame-controls-toggle";
			toggle.type = "button";
			toggle.textContent = "隐藏";
			toolbar.appendChild(toggle);
			const layoutButton = document.createElement("button");
			layoutButton.id = "pgmgame-layout-toggle";
			layoutButton.type = "button";
			layoutButton.textContent = "布局";
			toolbar.appendChild(layoutButton);
			const resetLayoutButton = document.createElement("button");
			resetLayoutButton.id = "pgmgame-layout-reset";
			resetLayoutButton.type = "button";
			resetLayoutButton.textContent = "复位";
			resetLayoutButton.hidden = true;
			toolbar.appendChild(resetLayoutButton);
			const copyLayoutButton = document.createElement("button");
			copyLayoutButton.id = "pgmgame-layout-copy";
			copyLayoutButton.type = "button";
			copyLayoutButton.textContent = "复制";
			copyLayoutButton.hidden = true;
			toolbar.appendChild(copyLayoutButton);
			const pasteLayoutButton = document.createElement("button");
			pasteLayoutButton.id = "pgmgame-layout-paste";
			pasteLayoutButton.type = "button";
			pasteLayoutButton.textContent = "粘贴";
			pasteLayoutButton.hidden = true;
			toolbar.appendChild(pasteLayoutButton);
			const cardButton = document.createElement("button");
			cardButton.id = "pgmgame-card-toggle";
			cardButton.type = "button";
			cardButton.textContent = "卡片";
			toolbar.appendChild(cardButton);
			cardButton.addEventListener("click", () => {
				cardModal.hidden = false;
				if (cardSlot && cardSlot.focus) cardSlot.focus();
				setCardStatus("选择卡槽后扫码、载入二维码照片，或直接上传 .bin/.pg2。");
			});
			const updateToolbarPosition = () => {
				const fullscreenMode = isFullscreenMode();
				toolbar.classList.toggle("pgmgame-toolbar-fullscreen-edge", fullscreenMode);
				const mobileFullscreenMode = fullscreenMode && isMobileMode && isPortraitMode();
				toolbar.classList.toggle("pgmgame-toolbar-mobile-fullscreen", mobileFullscreenMode);
				if (!mobileFullscreenMode) {
					toolbar.classList.remove("pgmgame-toolbar-expanded");
					menuToggle.textContent = "菜单";
				}
				if (fullscreenMode) {
					toolbar.style.left = "";
					toolbar.style.right = "";
					toolbar.style.top = "";
					toolbar.style.bottom = "";
					toolbar.style.transform = "";
					toolbar.style.width = "";
					if (isMobileMode && isPortraitMode()) {
						toolbar.style.position = "fixed";
						toolbar.style.left = "auto";
						toolbar.style.right = "max(8px, env(safe-area-inset-right))";
						toolbar.style.top = "calc(max(54px, env(safe-area-inset-top)) + 8px)";
						toolbar.style.bottom = "auto";
						toolbar.style.width = "auto";
						toolbar.style.transform = "none";
						return;
					}
					return;
				}
				const canvas = root.querySelector("canvas");
				const canvasRect = canvas ? canvas.getBoundingClientRect() : null;
				if (!canvasRect) return;
				const toolbarRect = toolbar.getBoundingClientRect();
				const gap = 12;
				toolbar.style.position = "fixed";
				if (isMobileMode && isPortraitMode()) {
					toolbar.style.left = "50%";
					toolbar.style.right = "auto";
					toolbar.style.top = "auto";
					toolbar.style.bottom = "calc(max(286px, 34dvh) + env(safe-area-inset-bottom))";
					toolbar.style.width = "min(96vw, 430px)";
					toolbar.style.transform = "translateX(-50%)";
					return;
				}
				const viewportWidth = window.innerWidth || document.documentElement.clientWidth;
				const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
				const rightSideSpace = Math.max(0, viewportWidth - canvasRect.right - gap * 2);
				toolbar.style.bottom = "auto";
				toolbar.style.right = "auto";
				toolbar.style.transform = "none";
				if (rightSideSpace >= 176) {
					toolbar.style.width = `${Math.min(430, Math.floor(rightSideSpace))}px`;
					toolbar.style.left = `${Math.round(canvasRect.right + gap)}px`;
					toolbar.style.top = `${Math.round(canvasRect.bottom - toolbarRect.height - gap)}px`;
					return;
				}
				const bottomSpace = Math.max(0, viewportHeight - canvasRect.bottom - gap * 2);
				toolbar.style.width = "min(74vw, 430px)";
				if (bottomSpace >= toolbarRect.height + gap) {
					toolbar.style.left = `${Math.round(canvasRect.left + canvasRect.width / 2)}px`;
					toolbar.style.top = `${Math.round(canvasRect.bottom + gap)}px`;
					toolbar.style.transform = "translateX(-50%)";
					return;
				}
				toolbar.style.left = `${Math.round(Math.max(gap, canvasRect.left + gap))}px`;
				toolbar.style.top = `${Math.round(Math.max(gap, canvasRect.bottom + gap))}px`;
			};
			const disableNativeMenu = () => {
				installNativeMenuBlocker();
			};
			requestAnimationFrame(() => {
				disableNativeMenu();
				updateToolbarPosition();
				requestAnimationFrame(() => {
					disableNativeMenu();
					updateToolbarPosition();
				});
			});

			const isStageFullscreen = () => isFullscreenMode();
			const orientationTip = document.getElementById("pgmgame-orientation-tip");
			const lockLandscape = async () => {
				try {
					if (screen.orientation && screen.orientation.lock) {
						await screen.orientation.lock("landscape");
						orientationTip.hidden = true;
						return;
					}
				} catch (e) {}
				orientationTip.hidden = false;
				setTimeout(() => {
					orientationTip.hidden = true;
				}, 3200);
			};
			const unlockOrientation = () => {
				try {
					if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
				} catch (e) {}
				orientationTip.hidden = true;
			};
			const syncFullscreenLabel = () => {
				requestAnimationFrame(updateToolbarPosition);
			};
			const enterPseudoFullscreen = () => {
				document.body.classList.add("pgmgame-pseudo-fullscreen");
				window.scrollTo(0, 1);
				lockLandscape();
				syncVideoFilter();
				updateToolbarPosition();
				syncFullscreenLabel();
			};
			const exitPseudoFullscreen = () => {
				document.body.classList.remove("pgmgame-pseudo-fullscreen");
				unlockOrientation();
				window.scrollTo(0, 0);
				syncVideoFilter();
				updateToolbarPosition();
				syncFullscreenLabel();
			};
			const togglePseudoFullscreen = () => {
				if (document.body.classList.contains("pgmgame-pseudo-fullscreen")) {
					exitPseudoFullscreen();
				} else {
					enterPseudoFullscreen();
				}
			};
			menuToggle.addEventListener("click", () => {
				toolbar.classList.toggle("pgmgame-toolbar-expanded");
				menuToggle.textContent = toolbar.classList.contains("pgmgame-toolbar-expanded") ? "收起" : "菜单";
			});
			layoutButton.addEventListener("click", () => {
				setLayoutEditing(!layoutEditing);
			});
			resetLayoutButton.addEventListener("click", () => {
				resetControlLayout();
			});
			copyLayoutButton.addEventListener("click", () => {
				copyControlLayoutCode();
			});
			pasteLayoutButton.addEventListener("click", () => {
				pasteControlLayoutCode();
			});
			document.addEventListener("fullscreenchange", () => {
				if (document.fullscreenElement || document.webkitFullscreenElement) {
					document.body.classList.add("pgmgame-pseudo-fullscreen");
				}
				if (!document.fullscreenElement && !document.webkitFullscreenElement) {
					document.body.classList.remove("pgmgame-pseudo-fullscreen");
					unlockOrientation();
				}
				syncVideoFilter();
				syncControlLayoutOrientation();
				syncFullscreenLabel();
			});
			document.addEventListener("webkitfullscreenchange", () => {
				if (document.fullscreenElement || document.webkitFullscreenElement) {
					document.body.classList.add("pgmgame-pseudo-fullscreen");
				}
				if (!document.fullscreenElement && !document.webkitFullscreenElement) {
					document.body.classList.remove("pgmgame-pseudo-fullscreen");
					unlockOrientation();
				}
				syncVideoFilter();
				syncControlLayoutOrientation();
				syncFullscreenLabel();
			});
			window.addEventListener("resize", () => {
				if (isFullscreenMode()) {
					window.scrollTo(0, 1);
				}
				syncVideoFilter();
				syncControlLayoutOrientation();
				updateToolbarPosition();
			});

			const setVisible = (visible) => {
				controls.classList.toggle("pgmgame-controls-hidden", !visible);
				toggle.textContent = visible ? "隐藏" : "操作";
				localStorage.setItem("pgmgame-controls-visible", visible ? "1" : "0");
			};
			const saved = localStorage.getItem("pgmgame-controls-visible");
			setVisible(isMobileMode ? true : saved === "1");
			toggle.addEventListener("click", () => {
				setVisible(controls.classList.contains("pgmgame-controls-hidden"));
			});
		};
		renderGameHome();
	</script>
</body>
</html>
